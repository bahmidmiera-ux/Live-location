<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePhone OS - Live React Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Smooth slide-in and fade-out animation for the custom popup */
        @keyframes slideIn {
            from { transform: translateY(20px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-popup {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>

    <script type="text/babel" type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, set } from "firebase/database";

        // Your Firebase Configuration
        const firebaseConfig = {
          apiKey: "AIzaSyBI2v6pUYn6GAhrS1MOdE5Y2LaVGVt0dEA",
          authDomain: "auramems-bba23.firebaseapp.com",
          databaseURL: "https://auramems-bba23-default-rtdb.firebaseio.com",
          projectId: "auramems-bba23",
          storageBucket: "auramems-bba23.firebasestorage.app",
          messagingSenderId: "589397587504",
          appId: "1:589397587504:web:89d4f688574b1cb9001ff5",
          measurementId: "G-VD5NT4FME7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function App() {
            // Main States
            const [stats, setStats] = React.useState({ data_used: 0, total_calls: 0, spam_calls: 0, online: false });
            const [location, setLocation] = React.useState({ lat: '--', lng: '--', address: 'Awaiting Device GPS...' });
            const [callLogs, setCallLogs] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            // Custom Notification State (No browser alert)
            const [notification, setNotification] = React.useState({ show: false, message: '', icon: '', type: '' });

            React.useEffect(() => {
                // 1. Live Data Stream for Phone Stats Counter
                const statusRef = ref(db, 'phone_status');
                const unsubStatus = onValue(statusRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setStats({
                            data_used: data.data_used || 0,
                            total_calls: data.total_calls || 0,
                            spam_calls: data.spam_calls || 0,
                            online: !!data.online
                        });
                    }
                    setLoading(false);
                });

                // 2. Live Data Stream for GPS Coordinates
                const locationRef = ref(db, 'location');
                const unsubLocation = onValue(locationRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setLocation({
                            lat: data.lat || '--',
                            lng: data.lng || '--',
                            address: data.address || `${data.lat}, ${data.lng}`
                        });
                    }
                });

                // 3. Live Data Stream for Realtime Call Log Feed
                const callsRef = ref(db, 'call_logs');
                const unsubCalls = onValue(callsRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const logsArray = Object.keys(data).map(key => data[key]).reverse();
                        setCallLogs(logsArray);
                    } else {
                        setCallLogs([]);
                    }
                });

                return () => {
                    unsubStatus();
                    unsubLocation();
                    unsubCalls();
                };
            }, []);

            // Helper function to trigger beautiful animated popup
            const showPopup = (message, icon, type) => {
                setNotification({ show: true, message, icon, type });
                // Auto hide after 3 seconds
                setTimeout(() => {
                    setNotification(prev => ({ ...prev, show: false }));
                }, 3000);
            };

            // Handle Trigger Button Clicks
            const sendSirenCommand = () => {
                set(ref(db, 'commands/siren'), true)
                    .then(() => showPopup("Emergency Siren activated on device!", "fa-volume-high", "siren"))
                    .catch((err) => showPopup("Failed: " + err.message, "fa-circle-xmark", "error"));
            };

            const sendLockCommand = () => {
                set(ref(db, 'commands/lock'), true)
                    .then(() => showPopup("Security Lock protocol broadcasted!", "fa-key", "lock"))
                    .catch((err) => showPopup("Failed: " + err.message, "fa-circle-xmark", "error"));
            };

            return (
                <div class="min-h-screen bg-slate-50 text-slate-800 relative">
                    
                    {/* CUSTOM ANIMATED POPUP NOTIFICATION (No Browser Prompts) */}
                    {notification.show && (
                        <div class="fixed bottom-5 right-5 z-[9999] p-4 rounded-2xl bg-slate-900 text-white shadow-2xl border border-slate-700 flex items-center space-x-3 max-w-sm animate-popup">
                            <div class={`p-2 rounded-xl text-lg ${
                                notification.type === 'siren' ? 'bg-rose-500/20 text-rose-400' : 
                                notification.type === 'lock' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'
                            }`}>
                                <i class={`fa-solid ${notification.icon}`}></i>
                            </div>
                            <div class="flex-1 pr-2">
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">System Alert</p>
                                <p class="text-sm font-semibold text-slate-100">{notification.message}</p>
                            </div>
                        </div>
                    )}

                    {/* Top Modern Header Area */}
                    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm flex justify-between items-center">
                        <div class="flex items-center space-x-3">
                            <div class="bg-emerald-500 text-white p-2 rounded-xl shadow-md shadow-emerald-500/20">
                                <i class="fa-solid fa-shield-halved text-lg"></i>
                            </div>
                            <span class="text-lg font-black tracking-wider text-slate-900">SECUREPHONE OS</span>
                        </div>
                        <div class="flex items-center space-x-2.5 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                            <span class="flex h-2 w-2 relative">
                                <span class={`absolute inline-flex h-full w-full rounded-full opacity-75 ${stats.online ? 'animate-ping bg-emerald-500' : 'bg-transparent'}`}></span>
                                <span class={`relative inline-flex rounded-full h-2 w-2 ${stats.online ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                            </span>
                            <span class={`text-xs font-bold ${stats.online ? 'text-emerald-600' : 'text-rose-600'}`}>
                                {loading ? 'Connecting...' : (stats.online ? 'Device: Online' : 'Device: Offline')}
                            </span>
                        </div>
                    </header>

                    {/* Main Workspace Layout */}
                    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Metrics Column */}
                        <div class="lg:col-span-2 space-y-6">
                            
                            {/* Grid Counters */}
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                {/* Bandwidth Card */}
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                                    <div>
                                        <p class="text-[11px] text-slate-400 uppercase font-extrabold tracking-wider">Data Usage</p>
                                        <h3 class="text-2xl font-black mt-1 text-slate-900">{stats.data_used} <span class="text-xs font-semibold text-slate-400">MB</span></h3>
                                    </div>
                                    <div class="bg-sky-50 text-sky-500 p-3 rounded-xl border border-sky-100">
                                        <i class="fa-solid fa-wifi text-lg"></i>
                                    </div>
                                </div>

                                {/* Call Count Card */}
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                                    <div>
                                        <p class="text-[11px] text-slate-400 uppercase font-extrabold tracking-wider">Total Calls</p>
                                        <h3 class="text-2xl font-black mt-1 text-slate-900">{stats.total_calls} <span class="text-xs font-semibold text-slate-400">Calls</span></h3>
                                    </div>
                                    <div class="bg-indigo-50 text-indigo-500 p-3 rounded-xl border border-indigo-100">
                                        <i class="fa-solid fa-phone text-lg"></i>
                                    </div>
                                </div>

                                {/* Spam Card */}
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                                    <div>
                                        <p class="text-[11px] text-slate-400 uppercase font-extrabold tracking-wider">Spam Blocked</p>
                                        <h3 class="text-2xl font-black mt-1 text-rose-600">{stats.spam_calls} <span class="text-xs font-semibold text-slate-400">Alerts</span></h3>
                                    </div>
                                    <div class="bg-rose-50 text-rose-500 p-3 rounded-xl border border-rose-100">
                                        <i class="fa-solid fa-triangle-exclamation text-lg"></i>
                                    </div>
                                </div>
                            </div>

                            {/* GPS Tracker Map Display */}
                            <div class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 shadow-sm">
                                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-4">
                                    <h2 class="text-sm md:text-base font-bold text-slate-800 flex items-center gap-2">
                                        <i class="fa-solid fa-location-dot text-emerald-500"></i> Anti-Theft Live GPS Tracker
                                    </h2>
                                    <span class="text-[11px] text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 font-mono self-start sm:self-auto">
                                        Lat: {location.lat}, Lon: {location.lng}
                                    </span>
                                </div>
                                
                                <div class="w-full h-64 md:h-80 bg-slate-100 rounded-xl relative overflow-hidden flex items-center justify-center border border-slate-200">
                                    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:20px_20px]"></div>
                                    
                                    <div class="relative flex items-center justify-center">
                                        <span class="animate-ping absolute inline-flex h-16 w-16 rounded-full bg-emerald-500 opacity-20"></span>
                                        <div class="bg-emerald-500 text-white p-4 rounded-full shadow-lg shadow-emerald-500/30 relative z-10">
                                            <i class="fa-solid fa-mobile-screen-button text-xl"></i>
                                        </div>
                                    </div>
                                    
                                    <p class="absolute bottom-3 left-3 right-3 bg-white/95 text-[11px] md:text-xs p-3 rounded-xl border border-slate-200 text-center sm:text-left truncate text-slate-600 font-medium shadow-sm">
                                        <i class="fa-solid fa-map-pin text-rose-500 mr-1"></i> Current Address: <span class="text-slate-900 font-semibold">{location.address}</span>
                                    </p>
                                </div>
                            </div>

                        </div>

                        {/* Right Panel Control & Logs Column */}
                        <div class="space-y-6">
                            
                            {/* Command Dashboard */}
                            <div class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 shadow-sm">
                                <h2 class="text-sm md:text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i class="fa-solid fa-lock text-amber-500"></i> Remote Emergency Controls
                                </h2>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onClick={sendSirenCommand} class="p-3 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition-all flex flex-col items-center gap-1.5 text-xs shadow-md shadow-rose-500/10 active:scale-95 cursor-pointer">
                                        <i class="fa-solid fa-volume-high text-base"></i> Sound Siren
                                    </button>
                                    <button onClick={sendLockCommand} class="p-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl transition-all flex flex-col items-center gap-1.5 text-xs shadow-md shadow-amber-500/10 active:scale-95 cursor-pointer">
                                        <i class="fa-solid fa-key text-base"></i> Lock Device
                                    </button>
                                </div>
                            </div>

                            {/* Feed Stream */}
                            <div class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 shadow-sm">
                                <h2 class="text-sm md:text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i> Live Call Stream
                                </h2>
                                <div class="space-y-3 max-h-[380px] overflow-y-auto pr-1">
                                    {callLogs.length > 0 ? (
                                        callLogs.map((log, idx) => {
                                            const isSpam = log.type === 'spam' || log.isSpam === true;
                                            return (
                                                <div key={idx} class={`p-3 rounded-xl border flex items-center justify-between shadow-sm transition-all ${isSpam ? 'bg-rose-50/50 border-rose-100 text-rose-900' : 'bg-slate-50 border-slate-100 text-slate-800'}`}>
                                                    <div class="flex items-center space-x-3 min-w-0 flex-1">
                                                        <div class={`p-2 rounded-lg ${isSpam ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                            <i class={`fa-solid ${isSpam ? 'fa-phone-slash'
